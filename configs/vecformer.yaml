# -------------------------- log ------------------------- #
log_level: info
log_on_each_node: false
logging_steps: 500
logging_first_step: true
report_to:
    - tensorboard
    - wandb

# ------------------------- train ------------------------ #
num_train_epochs: 5
per_device_train_batch_size: 2
per_device_eval_batch_size: 1
optim: adamw_torch_fused
bf16: false 
learning_rate: 0.00005
lr_scheduler_type: warmup_stable_decay
warmup_ratio: 0.05
lr_scheduler_kwargs:
    num_decay_steps: 43500
    min_lr_ratio: 0.1
weight_decay: 0.05

# ------------------------- eval ------------------------- #
batch_eval_metrics: true
eval_strategy: epoch
eval_steps: 2175
eval_on_start: true

# ------------------------- save ------------------------- #
metric_for_best_model: PQ
save_strategy: best

# ---------------------- determinism --------------------- #
seed: 42

# ------------------------- data ------------------------- #
# changed by efck (2026-03-10): increased from 2 to 8 after switching to .pt loader (torch.load is far lighter than json.load + to_tensor)
# with JSON loading 2 was the ceiling; with .pt loading 8 workers is safe without memory pressure
dataloader_num_workers: 8
dataloader_pin_memory: true  # changed by efck: pin memory for faster CPU to GPU data transfer
dataloader_drop_last: true # TODO!: if false, the eval step will have some strange bugs, wait to fix

